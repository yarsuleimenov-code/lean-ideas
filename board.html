<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Публичная доска инициатив</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="border-b border-slate-200 bg-white">
        <div class="mx-auto flex max-w-6xl flex-col gap-4 px-4 py-5 sm:flex-row sm:items-center sm:justify-between">
          <a href="index.html" class="text-xl font-black text-slate-900">Lean Ideas Zaberman</a>
          <nav class="flex flex-wrap gap-2 text-sm font-bold">
            <a class="rounded-lg px-3 py-2 text-slate-700 hover:bg-slate-100" href="index.html">Подать инициативу</a>
            <a class="rounded-lg px-3 py-2 text-slate-700 hover:bg-slate-100" href="admin.html">Администратор</a>
          </nav>
        </div>
      </header>

      <main class="mx-auto max-w-6xl px-4 py-8">
        <div class="mb-6 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
          <div>
            <p class="text-sm font-black uppercase tracking-wide text-emerald-700">Прозрачность процесса</p>
            <h1 class="mt-2 text-3xl font-black text-slate-950">Публичная доска инициатив</h1>
          </div>
          <button id="refreshButton" class="btn-secondary" type="button">Обновить</button>
        </div>

        <section class="mb-6 grid gap-4 rounded-lg border border-slate-200 bg-white p-4 shadow-sm md:grid-cols-2">
          <div>
            <label class="field-label" for="statusFilter">Статус</label>
            <select id="statusFilter" class="form-input mt-2"></select>
          </div>
          <div>
            <label class="field-label" for="categoryFilter">Категория</label>
            <select id="categoryFilter" class="form-input mt-2"></select>
          </div>
        </section>

        <div id="boardMessage" class="hidden rounded-lg border border-slate-200 bg-white p-4 text-sm font-bold text-slate-700"></div>
        <section id="cards" class="grid gap-4 md:grid-cols-2 xl:grid-cols-3"></section>
      </main>
    </div>

    <script type="module" src="./js/board.js"></script>
  </body>
</html>
